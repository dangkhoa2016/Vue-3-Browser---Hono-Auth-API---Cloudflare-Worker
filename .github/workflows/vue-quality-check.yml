name: vue-quality-check

on:
  pull_request:
    paths:
      - 'vue/**'
      - 'assets/js/router.js'
      - 'tools/vue-file-size-check.cjs'
      - '.github/workflows/vue-quality-check.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'vue/**'
      - 'assets/js/router.js'
      - 'tools/vue-file-size-check.cjs'
      - '.github/workflows/vue-quality-check.yml'

jobs:
  vue-file-size-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Vue file size limits (warn-only baseline)
        run: node tools/vue-file-size-check.cjs --warn-only

      - name: Run Vue custom lint rules (warn-only baseline)
        run: node tools/vue-custom-lint.cjs --warn-only

      - name: Track script-setup migration coverage (warn-only baseline)
        run: node tools/vue-script-setup-coverage.cjs --warn-only --pages-threshold=30 --components-threshold=10 --global-threshold=20
